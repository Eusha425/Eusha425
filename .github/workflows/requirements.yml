name: GitHub Readme Stats Action
on:
  schedule:
    - cron: '0 */12 * * *' 
  workflow_dispatch: 

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          gh_token: ${{ secrets.STATS_TOKEN }}
          user: Eusha425
          stats_config: |
            theme=tokyonight
            show_icons=true
            count_private=true
            hide_border=true
          langs_config: |
            theme=tokyonight
            hide_border=true
            layout=compact
